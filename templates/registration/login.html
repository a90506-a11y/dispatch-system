<!DOCTYPE html>
<html>
<head>
    <title>登入</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .remember {
            margin: 10px 0;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🔐 登入系統</h2>

    {% if form.errors %}
        <div class="error">
            帳號或密碼錯誤
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="remember">
            <label>
                <input type="checkbox" name="remember_me">
                記住我
            </label>
        </div>

        <button type="submit">登入</button>
    </form>
</div>

</body>
</html>
