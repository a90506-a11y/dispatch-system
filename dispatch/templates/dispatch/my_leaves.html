<!DOCTYPE html>
<html>
<head>
    <title>我的休假紀錄</title>
    <style>
        body { font-family: Arial; padding: 20px; }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background-color: #333;
            color: white;
        }

        .approved { color: green; }
        .pending { color: orange; }
        .rejected { color: red; }
    </style>
</head>
<body>

<h2>📄 我的休假紀錄</h2>

<a href="/">← 返回首頁</a>

<table>
    <tr>
        <th>日期</th>
        <th>時段</th>
        <th>原因</th>
        <th>狀態</th>
    </tr>

    {% for l in leaves %}
    <tr>
        <td>{{ l.date }}</td>
        <td>{{ l.get_period_display }}</td>
        <td>{{ l.reason }}</td>
        <td>
            {% if l.status == 'approved' %}
                <span class="approved">已核准</span>
            {% elif l.status == 'rejected' %}
                <span class="rejected">已駁回</span>
            {% else %}
                <span class="pending">待審核</span>
            {% endif %}
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">尚無紀錄</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
