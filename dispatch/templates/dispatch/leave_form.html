<!DOCTYPE html>
<html>
<head>
    <title>申請休假</title>
    <style>
        body { font-family: Arial; padding: 20px; }

        input, select, textarea {
            width: 300px;
            margin-bottom: 10px;
            padding: 5px;
        }

        button {
            padding: 10px;
            background: #dc3545;
            color: white;
            border: none;
        }

        a {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: #007bff;
        }

        .info-box {
            background:#e9f7ef;
            padding:10px;
            margin-bottom:15px;
        }

        .error {
            color:red;
            margin-bottom:10px;
        }
    </style>
</head>

<body>

<h2>📅 申請休假</h2>

<a href="/">← 返回首頁</a>

<!-- ⭐ 年假資訊 -->
<h3>📊 年假狀況</h3>

<div class="info-box">
    年假總額：{{ total_days }} 天<br>
    已使用：{{ used_days }} 天<br>
    剩餘：{{ remaining_days }} 天
</div>

{% if error %}
<div class="error">
    {{ error }}
</div>
{% endif %}

<form method="post">
    {% csrf_token %}

    <p>申請人：{{ engineer_name }}</p>

    日期：<br>
    <input type="date" name="date">
    結束日期：<br>
    <input type="date" name="end_date"><br><br>

    時段：<br>
    <select name="period">
        <option value="morning">上午</option>
        <option value="afternoon">下午</option>
        <option value="full">全天</option>
    </select><br>

    原因：<br>
    <textarea name="reason"></textarea><br>

    <button type="submit">送出申請</button>
</form>

</body>
</html>
