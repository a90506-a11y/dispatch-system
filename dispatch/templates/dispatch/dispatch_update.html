<!DOCTYPE html>
<html>
<head>
    <title>修改派工</title>
</head>
<body>

<h2>✏ 修改派工</h2>

<form method="post">
    {% csrf_token %}

    日期：<br>
    <input type="date" name="date" value="{{ order.date|date:'Y-m-d' }}"><br><br>

    指定時間：<br>
    <input type="time" name="scheduled_time"
       value="{{ order.scheduled_time|time:'H:i' }}"
       step="600"><br><br>

    客戶名稱：<br>
    <input type="text" name="customer_name" value="{{ order.customer_name }}"><br>

    聯絡人：<br>
    <input type="text" name="contact_person" value="{{ order.contact_person }}"><br>

    客戶電話：<br>
    <input type="text" name="customer_phone" value="{{ order.customer_phone }}"><br>

    工作內容：<br>
    <textarea name="description">{{ order.description }}</textarea><br>

    備註：<br>
    <textarea name="note">{{ order.note }}</textarea><br><br>

    工程師：<br>
    {% for e in engineers %}
        <label>
            <input type="checkbox" name="engineers" value="{{ e.id }}"
            {% if e in order.engineers.all %}checked{% endif %}>
            {{ e.name }}
        </label><br>
    {% endfor %}

    <br>
    <button type="submit">儲存</button>
</form>

<br>
<a href="/">← 返回首頁</a>

</body>
</html>
