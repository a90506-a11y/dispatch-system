<!DOCTYPE html>
<html>
<head>
    <title>新增派工</title>
    <style>
        body { font-family: Arial; padding: 20px; }

        input, textarea {
            width: 300px;
            margin-bottom: 10px;
            padding: 5px;
        }

        button {
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
        }

        a {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: #007bff;
        }
    </style>
</head>
<body>

<h2>➕ 新增派工</h2>

<!-- ✅ 返回鍵（你剛剛少這個） -->
<a href="/">← 返回首頁</a>

<form method="post">
    {% csrf_token %}

    日期：<br>
    <input type="date" name="date" value="{{ today }}"><br>

    <!-- ✅ 說明寫清楚 -->
    指定時間（例：12點30分請填 1230）：<br>
    <input type="text" name="scheduled_time" placeholder="例如 1230"><br><br>

    客戶名稱：<br>
    <input type="text" name="customer_name"><br>

    聯絡人：<br>
    <input type="text" name="contact_person"><br>

    客戶電話：<br>
    <input type="text" name="customer_phone"><br>

    工作內容：<br>
    <textarea name="description"></textarea><br>

    備註：<br>
    <textarea name="note"></textarea><br>

    工程師：<br>

    <div style="margin-top:10px;">
    {% for e in engineers %}
        <label style="display:flex; align-items:center; margin-bottom:8px; cursor:pointer;">
            <input type="checkbox" name="engineers" value="{{ e.id }}"
                   style="width:auto; margin-right:8px;">
            {{ e.name }}
        </label>
    {% endfor %}
    </div>

    <button type="submit">送出</button>
</form>

</body>
</html>
